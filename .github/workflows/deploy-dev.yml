name: Deploy Dev

on:
  push:
    branches:
      - main

env:
  AWS_REGION: us-east-1
  AMPLIFY_APP_NAME: foji-ui-dev

jobs:
  deploy:
    name: Deploy to Amplify (Dev)
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_AI_API_URL: ${{ secrets.NEXT_PUBLIC_AI_API_URL }}
          NEXT_PUBLIC_WIDGET_URL: ${{ secrets.NEXT_PUBLIC_WIDGET_URL }}

      - name: Ensure Amplify app exists
        id: amplify-app
        run: |
          APP_ID=$(aws amplify list-apps \
            --query "apps[?name=='${AMPLIFY_APP_NAME}'].appId | [0]" --output text)

          if [ "$APP_ID" = "None" ] || [ -z "$APP_ID" ]; then
            echo "Creating Amplify app..."
            APP_ID=$(aws amplify create-app \
              --name "$AMPLIFY_APP_NAME" \
              --platform WEB_COMPUTE \
              --query "app.appId" --output text)
            aws amplify create-branch \
              --app-id "$APP_ID" \
              --branch-name main
          fi
          echo "app_id=$APP_ID" >> $GITHUB_OUTPUT

      - name: Deploy to Amplify
        env:
          APP_ID: ${{ steps.amplify-app.outputs.app_id }}
        run: |
          # Package the build output
          cd .next && zip -r ../deployment.zip . && cd ..

          # Start deployment
          UPLOAD=$(aws amplify create-deployment \
            --app-id "$APP_ID" \
            --branch-name main \
            --query '{jobId: jobId, zipUploadUrl: zipUploadUrl}' --output json)

          UPLOAD_URL=$(echo $UPLOAD | jq -r '.zipUploadUrl')
          JOB_ID=$(echo $UPLOAD | jq -r '.jobId')

          # Upload build artifact
          curl -T deployment.zip "$UPLOAD_URL" --fail --silent

          # Start the deployment
          aws amplify start-deployment \
            --app-id "$APP_ID" \
            --branch-name main \
            --job-id "$JOB_ID"

          # Wait for deployment
          for i in $(seq 1 30); do
            STATUS=$(aws amplify get-job \
              --app-id "$APP_ID" \
              --branch-name main \
              --job-id "$JOB_ID" \
              --query "job.summary.status" --output text)
            echo "Status: $STATUS (attempt $i/30)"
            if [ "$STATUS" = "SUCCEED" ]; then
              DOMAIN=$(aws amplify get-app --app-id "$APP_ID" \
                --query "app.defaultDomain" --output text)
              echo "## Dev Deployment" >> $GITHUB_STEP_SUMMARY
              echo "**URL**: https://main.${DOMAIN}" >> $GITHUB_STEP_SUMMARY
              exit 0
            elif [ "$STATUS" = "FAILED" ] || [ "$STATUS" = "CANCELLED" ]; then
              echo "Deployment failed with status: $STATUS"
              exit 1
            fi
            sleep 20
          done
          echo "Deployment timed out" && exit 1
